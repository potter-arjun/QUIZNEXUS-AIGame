name: Navodaya Quiz Battle CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Prisma Generate Client
        run: |
          cd server
          npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/navodaya_quiz?schema=public"

      - name: Run server test suites
        run: |
          cd server
          npm test
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/navodaya_quiz?schema=public"
          JWT_SECRET: "test-secret-key-for-ci"

  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Compile and build client
        run: |
          cd client
          npm run build
        env:
          NEXT_PUBLIC_SERVER_URL: "http://localhost:5000"
