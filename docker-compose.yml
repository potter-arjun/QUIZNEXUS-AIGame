version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: navodaya_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: navodaya_quiz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: navodaya_redis
    restart: always
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: navodaya_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/navodaya_quiz?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-key-for-dev-navodaya-quiz-battle-2026
      - PORT=5000
    depends_on:
      - db
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: navodaya_client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SERVER_URL=http://localhost:5000
    depends_on:
      - server

volumes:
  postgres_data:
